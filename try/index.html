<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>喵吉曆 — 本喵先幫你看今天</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: "Noto Sans TC", "PingFang TC", sans-serif; background: #f4efe5; color: #2b2b2b; min-height: 100vh; display: flex; justify-content: center; }
  .wrap { width: 100%; max-width: 430px; padding: 28px 20px 48px; }
  h1 { font-size: 26px; margin-bottom: 4px; }
  .sub { color: #6b665d; font-size: 14px; margin-bottom: 20px; }
  .card { background: #fffdf8; border: 1px solid #e5dfd2; border-radius: 18px; padding: 18px 16px; margin-bottom: 14px; }
  label { font-size: 13px; font-weight: 700; color: #6b665d; display: block; margin: 10px 0 6px; }
  input, select { width: 100%; padding: 12px; font-size: 16px; border: 1.5px solid #e5dfd2; border-radius: 12px; background: #fff; }
  button.go { width: 100%; margin-top: 16px; padding: 14px; font-size: 16px; font-weight: 800; color: #fff; background: #c9a227; border: none; border-radius: 999px; }
  .hidden { display: none; }
  .folded { opacity: .55; }
  #err { color: #c0392b; font-size: 13px; margin-top: 8px; }
  .score-row { display: flex; align-items: baseline; gap: 10px; }
  #score { font-size: 56px; font-weight: 800; }
  .level { font-size: 14px; font-weight: 800; color: #fff; padding: 3px 12px; border-radius: 999px; background: #b5ad9b; }
  .level.ji { background: #c0392b; } .level.shen { background: #34495e; }
  #ganzhi { color: #6b665d; font-size: 13px; margin: 6px 0 10px; }
  #quote { font-size: 15px; line-height: 1.7; margin-bottom: 10px; }
  #omen { font-size: 13.5px; color: #8a6a08; line-height: 1.6; margin-bottom: 8px; }
  #lucky { font-size: 13px; font-weight: 700; color: #6e8b5e; }
  .cta { text-align: center; }
  .cta p { font-size: 14px; color: #6b665d; margin-bottom: 12px; line-height: 1.7; }
  .cta a { display: inline-block; padding: 14px 34px; background: #c9a227; color: #fff; font-weight: 800; border-radius: 999px; text-decoration: none; font-size: 16px; }
  .note { font-size: 11.5px; color: #9a9184; margin-top: 10px; text-align: center; line-height: 1.6; }
  .cat { width: 130px; display: block; margin: 0 auto 8px; }
</style>
  <script type="module" crossorigin src="./assets/index-BWgSDdyj.js"></script>
</head>
<body>
  <div class="wrap">
    <img class="cat" src="./cat/cat-crystal.png" alt="喵大師" onerror="this.style.display='none'" />
    <h1>喵吉曆</h1>
    <p class="sub">每日運勢 × 擇日,陪你過好每一天。先讓本喵免費看你的今天:</p>

    <div class="card" id="form-card">
      <label for="birth">你的生日</label>
      <input type="date" id="birth" min="1930-01-01" max="2020-12-31" />
      <label for="gender">性別(排盤用)</label>
      <select id="gender">
        <option value="female">女</option>
        <option value="male">男</option>
        <option value="na">不方便說</option>
      </select>
      <button class="go" id="go">🔮 本喵幫你看今天</button>
      <p id="err"></p>
    </div>

    <div class="result-anchor"></div>
    <div class="card hidden" id="result">
      <div class="score-row"><span id="score">--</span><span>分</span><span class="level" id="level">平</span><span id="paws"></span></div>
      <p id="ganzhi"></p>
      <p id="quote"></p>
      <p id="omen"></p>
      <p id="lucky"></p>
    </div>

    <div class="card cta hidden" id="cta">
      <p>這只是通用盤。<br /><b>加上出生時辰</b>,分數、吉時、每天的錦囊全部變成你專屬的——還有一隻記得你大日子的貓。</p>
      <a id="store" href="#">下載喵吉曆 App</a>
      <p class="note">排盤在你的裝置上完成,生日不會被上傳或儲存。</p>
    </div>
  </div>
</body>
</html>
